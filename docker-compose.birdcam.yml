services:
  birdcam:
    build:
      context: .
      dockerfile: Dockerfile.birdcam
    restart: unless-stopped
    command: ["python", "-m", "birdcam.cli", "run", "--config", "/config/config.yaml"]
    volumes:
      - ./config.example.yaml:/config/config.yaml:ro
      - /mnt/ssd/birdcam:/data
    environment:
      NEO4J_URI: ${NEO4J_URI}
      NEO4J_USERNAME: ${NEO4J_USERNAME}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
  neo4j:
    image: neo4j:5
    profiles: ["dev-neo4j"]
    environment:
      NEO4J_AUTH: neo4j/change-me
    ports: ["7474:7474", "7687:7687"]
