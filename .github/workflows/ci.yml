name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight test deps (no ML stack)
        # The full requirements.txt pulls torch/transformers/ultralytics (CPU/CUDA).
        # CI only needs the dependency-free surface + the test deps so the suite
        # stays green without the ML stack (W-49).
        run: |
          python -m pip install --upgrade pip
          pip install "pydantic>=2.6" "PyYAML>=6.0" "neo4j>=5.24" \
                      "fastapi" "python-multipart" "numpy" "opencv-python-headless" \
                      "pytest>=8.0" "pytest-cov>=6.0" "ruff>=0.5" \
                      "pydantic-settings" "httpx"

      - name: Ruff (lint, non-blocking until fully adopted)
        continue-on-error: true
        run: ruff check . || echo "ruff issues (non-blocking)"

      - name: Pytest (content_os / birdcam / tests / auto_ingest light)
        run: |
          python -m pytest -q
