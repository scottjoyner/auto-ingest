# Auto-Ingest Docker Compose
# Services: ingest, worker, sync, content, cron jobs
# All paths mounted from host via NAS_ROOT (.env)

services:
  # === Ingest Service ===
  # Runs run_ingest_all.sh continuously. Has flock-based concurrency guard.
  ingest-service:
    build: .
    image: auto-ingest:latest
    container_name: auto-ingest-service
    command: ["bash", "-c", "while true; do /app/run_ingest_all.sh; sleep 300; done"]
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SCAN_ROOTS: ${SCAN_ROOTS}
      DASHCAM_ROOT: ${DASHCAM_ROOT}
      NEO4J_URI: ${NEO4J_URI}
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_DB: ${NEO4J_DB}
      LOCAL_TZ: America/New_York
      EMBED_MODEL_NAME: sentence-transformers/all-MiniLM-L6-v2
      MODEL_PREF: large-v3,faster-whisper:large-v3
      LOG_LEVEL: INFO
    volumes:
      - ./:/app
      - ${NAS_ROOT}:/nas
      - ${NAS1_ROOT:-/media/scott/SSD_4TB}:/nas1
      - ${NAS2_ROOT:-/media/scott/NAS5}:/nas2
    networks:
      - auto-ingest-net
    # Healthy if the ingest loop script + its flock guard are present and Neo4j
    # is reachable from inside the container (read-only check).
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/run_ingest_all.sh && python3 /app/scripts/neo4j_watchdog.py --no-alert"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 30s

  # === Ingest Worker (distributed) ===
  # Claims .job files from NAS drop queue and executes them
  ingest-worker:
    build: .
    image: auto-ingest:latest
    container_name: auto-ingest-worker
    command: ["bash", "-c", "while true; do /app/deploy/worker_ingest.sh; sleep 30; done"]
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DROP_ROOT: ${DROP_ROOT}
      AUDIO_ROOT: ${AUDIO_ROOT}
      DASHCAM_ROOT: ${DASHCAM_ROOT}
      BODYCAM_ROOT: ${BODYCAM_ROOT}
      TRANSCRIPT_ROOT: ${TRANSCRIPT_ROOT}
      NEO4J_URI: ${NEO4J_URI}
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_DB: ${NEO4J_DB}
    volumes:
      - ./:/app
      - ${NAS_ROOT}:/nas
      - ${NAS1_ROOT:-/media/scott/SSD_4TB}:/nas1
      - ${NAS2_ROOT:-/media/scott/NAS5}:/nas2
    networks:
      - auto-ingest-net
    # Healthy if the worker script + drop-queue mount are present and Neo4j is
    # reachable (read-only). Confirms the worker can actually claim + persist.
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/deploy/worker_ingest.sh && python3 /app/scripts/neo4j_watchdog.py --no-alert"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 30s

  # === Sync Service ===
  # Continuously syncs legacy drop from deathstar into canonical roots
  sync-service:
    build: .
    image: auto-ingest:latest
    container_name: auto-sync-service
    command: ["bash", "-c", "while true; do /app/deploy/sync_from_legacy_drop.sh >> /var/log/sync.log 2>&1; sleep 600; done"]
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      LEGACY_DROP_ROOT: ${LEGACY_DROP_ROOT}
      AUDIO_ROOT: ${AUDIO_ROOT}
      DASHCAM_ROOT: ${DASHCAM_ROOT}
      BODYCAM_ROOT: ${BODYCAM_ROOT}
      TRANSCRIPT_ROOT: ${TRANSCRIPT_ROOT}
      YOLO_ROOT: ${YOLO_ROOT}
      META_ROOT: ${META_ROOT}
    volumes:
      - ./:/app
      - ${NAS_ROOT}:/nas
      - ${NAS1_ROOT:-/media/scott/SSD_4TB}:/nas1
      - ${NAS2_ROOT:-/media/scott/NAS5}:/nas2
    networks:
      - auto-ingest-net

  # === Content OS Service ===
  # Runs content-os status loop for content workflow monitoring
  content-service:
    build: .
    image: auto-ingest:latest
    container_name: content-generation-service
    command: ["bash", "-c", "while true; do /usr/local/bin/content-os status; sleep 1800; done"]
    restart: unless-stopped
    environment:
      CONTENT_OS_LLM_BASE_URL: ${CONTENT_OS_LLM_BASE_URL}
      CONTENT_OS_LLM_API_KEY: ${CONTENT_OS_LLM_API_KEY}
      CONTENT_OS_LLM_MODEL: ${CONTENT_OS_LLM_MODEL}
      CONTENT_OS_LLM_TEMPERATURE: ${CONTENT_OS_LLM_TEMPERATURE}
      CONTENT_OS_LLM_MAX_TOKENS: ${CONTENT_OS_LLM_MAX_TOKENS}
    volumes:
      - ./:/app
    networks:
      - auto-ingest-net

  # === Ingest Cron ===
  # Runs sync + ingest on a schedule (every 5 min)
  ingest-cron:
    build: .
    image: auto-ingest:latest
    entrypoint: ["/app/deploy/start-cron.sh"]
    environment:
      CRON_FILE: /app/deploy/cron/ingest.crontab
      SCAN_ROOTS: ${SCAN_ROOTS}
      DASHCAM_ROOT: ${DASHCAM_ROOT}
      NEO4J_URI: ${NEO4J_URI}
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_DB: ${NEO4J_DB}
    volumes:
      - ./:/app
      - ${NAS_ROOT}:/nas
      - ${NAS1_ROOT:-/media/scott/SSD_4TB}:/nas1
      - ${NAS2_ROOT:-/media/scott/NAS5}:/nas2
    networks:
      - auto-ingest-net

  # === Content Cron ===
  # Runs content workflow batch every 30 min
  content-cron:
    build: .
    image: auto-ingest:latest
    entrypoint: ["/app/deploy/start-cron.sh"]
    environment:
      CRON_FILE: /app/deploy/cron/content_generation.crontab
      CONTENT_OS_LLM_BASE_URL: ${CONTENT_OS_LLM_BASE_URL}
      CONTENT_OS_LLM_API_KEY: ${CONTENT_OS_LLM_API_KEY}
      CONTENT_OS_LLM_MODEL: ${CONTENT_OS_LLM_MODEL}
    volumes:
      - ./:/app
    networks:
      - auto-ingest-net

networks:
  auto-ingest-net:
    driver: bridge
